services:
  web:
    build:
      context: .
      dockerfile: WebApplication1/WebApplication1/WebApplication1/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      # Overstyrer appsettings i containeren:
      - ConnectionStrings__DefaultConnection=server=mariadbcontainer;port=3306;database=nrl;user=nrl;password=nrlpass
    networks:
      - appnet
    depends_on: []
networks:
  appnet:
    external: true
